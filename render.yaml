# Render Blueprint — backend + static dashboard.
# Database is hosted on Supabase (external), so no Render Postgres needed.
#
# Usage:
#   1. Create a Supabase project and copy the Session Pooler connection string.
#   2. Push to GitHub.
#   3. In Render dashboard: New + > Blueprint > pick this repo.
#   4. After deploy, set the environment variables listed below under
#      phish-backend in the "Environment" tab.
#
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: phish-backend
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # --- Supabase PostgreSQL ---
      # Paste the "Session pooler" connection string from:
      # Supabase dashboard → Project Settings → Database → Connection string → URI
      # Format: postgresql://postgres.PROJECT_REF:PASSWORD@aws-0-REGION.pooler.supabase.com:5432/postgres
      - key: DATABASE_URL
        sync: false

      # --- Security ---
      # Static API key for the browser extension / CLI (X-API-Key header).
      - key: API_KEY
        generateValue: true

      # Dashboard JWT auth — set all three before going live.
      # Generate hash: python -c "from passlib.context import CryptContext; print(CryptContext(['bcrypt']).hash('yourpassword'))"
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD_HASH
        sync: false
      # Generate secret: openssl rand -hex 32
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_MINUTES
        value: "480"

      # --- LINE Bot (optional — leave blank to disable) ---
      - key: LINE_CHANNEL_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false

      # --- CORS ---
      # Add the dashboard URL after first deploy (copy from phish-dashboard service).
      - key: CORS_ORIGINS
        value: "https://*.onrender.com"

      # --- Performance tweaks for free tier ---
      - key: ENABLE_WHOIS
        value: "false"
      - key: ENABLE_TLS
        value: "true"
      - key: NETWORK_TIMEOUT
        value: "2.0"
      - key: RATE_LIMIT
        value: "60/minute"

  # Static dashboard — Vite bakes VITE_API_URL at build time.
  - type: web
    name: phish-dashboard
    runtime: static
    rootDir: dashboard
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        fromService:
          name: phish-backend
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
